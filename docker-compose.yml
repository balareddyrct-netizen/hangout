version: '3.8'

services:
  web:
    build: .
    container_name: hangout_web
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=Hangout Production
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-for-development-only}
      - DATABASE_URL=postgresql://hangout_user:hangout_password@db:5432/hangout_db
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: hangout_db
    environment:
      - POSTGRES_USER=hangout_user
      - POSTGRES_PASSWORD=hangout_password
      - POSTGRES_DB=hangout_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hangout_user -d hangout_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
